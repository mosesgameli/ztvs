# Lefthook Configuration (REPLICATE CI)
# Refer: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      tags: linter
      run: golangci-lint run --fast
    gosec:
      tags: security
      run: gosec ./...
    govulncheck:
      tags: security
      run: govulncheck ./...

pre-push:
  commands:
    build:
      tags: build
      run: go build -o /dev/null ./cmd/zt
    test-coverage:
      tags: test
      run: ./scripts/check-coverage.sh
